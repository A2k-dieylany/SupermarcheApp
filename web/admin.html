<!DOCTYPE html>
<html lang='fr'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Supermarché</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel='stylesheet' href='style.css'>
</head>
<body>

    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="header-inner">
            <div class="header-brand">
                <div class="brand-icon" style="background: #FEF3C7; color: #D97706;">⚙️</div>
                <div class="brand-text">
                    <h1>Back-Office Gérant</h1>
                    <p class="subtitle">Gestion du catalogue et des stocks</p>
                </div>
            </div>
            <a href="index.html" class="btn-outline" style="background: white;">Retour aux Caisses</a>
        </div>
    </header>

    <main>
        <section id="dashboard" style="display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;">
            
            <div class="card-ui" style="flex: 1; min-width: 250px; background: linear-gradient(135deg, #10B981, #059669); color: white; border: none; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);">
                <div style="font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Chiffre d'Affaires</div>
                <div style="font-size: 2.5em; font-weight: 800; margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    💰 <span id="dash-ca">0.00</span> FCFA
                </div>
            </div>

            <div class="card-ui" style="flex: 1; min-width: 200px; background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; border: none; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);">
                <div style="font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Clients Servis</div>
                <div style="font-size: 2.5em; font-weight: 800; margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    👥 <span id="dash-clients">0</span>
                </div>
            </div>

            <div class="card-ui" style="flex: 1; min-width: 200px; background: linear-gradient(135deg, #8B5CF6, #6D28D9); color: white; border: none; box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);">
                <div style="font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Panier Moyen</div>
                <div style="font-size: 2.5em; font-weight: 800; margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    🛒 <span id="dash-moyen">0.00</span> FCFA
                </div>
            </div>

            <div class="card-ui" style="flex: 100%; margin-top: 10px; background: white; padding: 20px; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
                <h3 style="margin-top: 0; margin-bottom: 15px; color: #374151; font-size: 1.1em; display: flex; align-items: center; gap: 8px;">
                    📈 Évolution du Chiffre d'Affaires
                </h3>
                <div style="position: relative; height: 250px; width: 100%;">
                    <canvas id="caChart"></canvas>
                </div>
            </div>
            
        </section>

        <section id="historique-ventes" style="margin-bottom: 30px;">
            <div class="card-ui" style="background: white; padding: 20px; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
                <h3 style="margin-top: 0; color: #374151;">🧾 Historique des Encaissements</h3>
                
                <div id="liste-historique" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 15px;">
                </div>
            </div>
        </section>

        <section id='controles'>
            <div class="groupe-controle card-ui" style="flex: 1; min-width: 300px;">
                <h3>
                    <span class="card-icon-wrap icon-blue">📦</span>
                    Nouveau Produit
                </h3>
                
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <input type='number' id='prodId' placeholder='ID Unique (ex: 6)' min="1">
                    <input type='text' id='prodNom' placeholder='Nom (ex: Jus de pomme)'>
                    <input type='number' id='prodPrix' placeholder='Prix en FCFA (ex: 2.50)' step="0.01" min="0">
                    <input type='text' id='prodCat' placeholder='Catégorie (ex: Boisson)'>
                    
                    <button class="btn-primary" style="width: 100%; justify-content: center;" onclick='ajouterNouveauProduit()'>
                        Ajouter au catalogue
                    </button>
                </div>
            </div>

            <div class="groupe-controle card-ui" style="flex: 2; min-width: 400px;">
                <h3>
                    <span class="card-icon-wrap icon-slate">📋</span>
                    Catalogue Actuel
                </h3>
                
                <div id="liste-produits-admin" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>
    <script src='admin.js'></script>
</body>
</html>
