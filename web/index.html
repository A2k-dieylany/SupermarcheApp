<!DOCTYPE html>
<html lang='fr'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarché — Dashboard Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='style.css'>
</head>
<body>

    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="header-inner">
            <div class="header-brand">
                <div class="brand-icon">🛒</div>
                <div class="brand-text">
                    <h1>Dashboard Supermarché</h1>
                    <p class="subtitle">Gestion des caisses en temps réel</p>
                </div>
            </div>
            <div class="live-chip">
                <span class="live-dot"></span>
                Mise à jour automatique
            </div>
        </div>
    </header>

    <main>

        <section id='controles'>

            <div class="groupe-controle card-ui" style="flex: 2;">
                <h3>
                    <span class="card-icon-wrap icon-blue">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    </span>
                    Faire ses courses
                </h3>
                
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type='text' id='nomClient' placeholder='Nom du client...'>
                    <button class="btn-primary" onclick='ajouterClient()'>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                        Aller en Caisse
                    </button>
                </div>

                <div id="catalogue-rayons" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; padding: 12px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border);">
                    </div>

                <div class="panier-resume" style="font-weight: 700; color: var(--primary); display: flex; align-items: center; justify-content: space-between; background: var(--blue-50); padding: 10px 15px; border-radius: 10px;">
                    <span>🛒 Panier : <span id="panier-count">0</span> article(s) &nbsp;|&nbsp; Total : <span id="panier-total">0.00</span> FCFA</span>
                    <button class="btn-outline-danger" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;" onclick="viderPanier()">Vider le panier</button>
                </div>
            </div>

            <div class="groupe-controle card-ui">
                <h3>
                    <span class="card-icon-wrap icon-slate">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                    </span>
                    Gérer les Caisses
                </h3>
                <div class="input-group">
                    <input type='number' id='numeroCaisse' placeholder='N° Caisse'>
                    <button class="btn-success" onclick='servirClient()'>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Servir
                    </button>
                    <button class="btn-outline" onclick='ouvrirCaisse()'>Ouvrir</button>
                    <button class="btn-outline-danger" onclick='fermerCaisse()'>Fermer</button>
                    </div>
            </div>

        </section>

        <section id='statistiques'>
            <div class="stat-badge">
                <div class="stat-icon-wrap">🏆</div>
                <div class="stat-text">
                    <span class="stat-label">Total clients servis</span>
                    <span id='totalServis' class="counter">0</span>
                </div>
                <div class="stat-separator"></div>
                <div class="stat-live">
                    <span class="live-dot small"></span>
                    En direct
                </div>
            </div>
        </section>

        <div class="section-heading">
            <h2>État des Caisses</h2>
            <div class="section-rule"></div>
        </div>

        <section id='grille-caisses'></section>

    </main>

    <div id="toast-container"></div>
    <script src='app.js?v=3'></script>

    <div id="ticket-modal">
        <div class="ticket-header">
            <h2>SEN SUPERMARCHÉ</h2>
            <p>Merci pour votre visite !</p>
        </div>
        <div id="ticket-lignes"></div>
        <div class="ticket-total">
            <span>TOTAL:</span>
            <span id="ticket-total-prix">0.00 FCFA</span>
        </div>
    </div>
</body>
</html>
